<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuessTheLyrics - Web Multiplayer Engine</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; background: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); text-align: center; border: 1px solid #334155; position: relative; }
        h1 { color: #f43f5e; margin-bottom: 25px; font-weight: 800; letter-spacing: -0.5px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #475569; border-radius: 8px; background: #0f172a; color: #fff; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s ease; background: #f43f5e; color: white; }
        button:hover { background: #e11d48; transform: translateY(-1px); }
        .hidden { display: none !important; }
        .opsi-container { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 20px; }
        
        /* Style Tombol Opsi Default */
        .btn-opsi { background: #334155; text-align: left; padding: 15px; border-radius: 8px; color: #fff; font-weight: normal; font-size: 16px; border: 2px solid transparent; transition: all 0.2s ease; }
        .btn-opsi:hover:not(:disabled) { background: #475569; }
        
        /* Poin 1: Efek klik nunggu timer (Latar putih, teks hitam) */
        .btn-opsi.state-menunggu { background: #ffffff !important; color: #0f172a !important; font-weight: bold; border: 2px solid #cbd5e1; }
        
        /* Poin 2: Efek evaluasi jawaban akhir */
        .btn-opsi.jawaban-benar { background: #10b981 !important; color: #ffffff !important; font-weight: bold; border: 2px solid #34d399; }
        .btn-opsi.jawaban-salah { background: #ef4444 !important; color: #ffffff !important; font-weight: bold; border: 2px solid #f87171; }

        .list-box { text-align: left; background: #0f172a; padding: 20px; border-radius: 10px; margin-top: 20px; border: 1px solid #334155; }
        .row-item { display: flex; justify-content: space-between; padding: 10px 10px; border-bottom: 1px solid #1e293b; border-radius: 6px; align-items: center; }
        .highlight-user { background: #334155; border-left: 4px solid #f43f5e; font-weight: bold; }
        .timer-badge { background: #f59e0b; color: #0f172a; padding: 6px 14px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        .btn-exit { background: #dc2626; font-size: 16px; padding: 14px; width: 100%; margin-top: 20px; }
        .btn-exit:hover { background: #b91c1c; }
        .btn-back { background: #475569; font-size: 14px; padding: 8px 16px; width: auto; margin-top: 10px; display: inline-block; }
        .btn-back:hover { background: #334155; }
        .menu-selection { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        .badge-stats { font-size: 13px; font-weight: normal; display: block; color: #94a3b8; margin-top: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎵 GuessTheLyrics</h1>

    <div id="lobby-view">
        <div id="menu-utama" class="menu-selection">
            <button onclick="UI.showLobbyForm('create')" style="background: #ec4899;">➕ Buat Room Baru</button>
            <button onclick="UI.showLobbyForm('join')" style="background: #2563eb;">🔌 Gabung Match</button>
        </div>

        <div id="form-container" class="hidden">
            <input type="text" id="username" placeholder="Ketik Username Anda...">
            <div id="join-fields" class="hidden">
                <input type="text" id="room-code-input" placeholder="Masukkan Kode PIN Room...">
            </div>
            <button id="btn-submit-action" onclick="App.submitLobbyForm()">Mulai</button>
            <button onclick="UI.resetLobbyMenu()" class="btn-back">⬅️ Kembali ke Menu</button>
        </div>
    </div>

    <div id="waiting-view" class="hidden">
        <h2>Room PIN: <span id="display-room-code" style="color: #f43f5e;"></span></h2>
        <p style="color: #94a3b8;">Menunggu pemain terhubung simpul...</p>
        <div class="list-box">
            <h4 style="margin-top: 0;">Daftar Koneksi Simpul Aktif:</h4>
            <div id="player-list"></div>
        </div>
        <button id="start-game-btn" class="hidden" onclick="App.startGame()" style="background: #10b981; margin-top: 20px;">Mulai Match 🚀</button>
    </div>

    <div id="game-view" class="hidden">
        <div id="timer-container" class="timer-badge">Waktu: <span id="timer-countdown">15</span>s</div>
        <h3 id="question-number" style="color: #38bdf8;">Soal</h3>
        <blockquote id="lyric-prompt" style="font-size: 18px; margin: 20px 0; line-height: 1.6; background: #0f172a; padding: 20px; border-radius: 8px; font-style: italic;"></blockquote>
        <div class="opsi-container" id="options-box"></div>
    </div>

    <div id="leaderboard-view" class="hidden">
        <h2 id="leaderboard-title" style="color: #10b981;">Papan Peringkat Sementara</h2>
        <div class="list-box" id="leaderboard-data"></div>
        <button id="exit-game-btn" onclick="App.exitGame()" class="btn-exit hidden">🚪 Keluar dari Game</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/state.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/socket.js"></script>
</body>
</html>
